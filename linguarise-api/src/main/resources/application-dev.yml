spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/linguarise
    username: linguarise
    password: linguarise_dev_2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/linguarise
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/linguarise
          jwk-set-uri: http://localhost:8180/realms/linguarise/protocol/openid-connect/certs